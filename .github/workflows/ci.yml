name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --all-extras --locked
      - run: uv lock --check
      - run: uv run pytest -q

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --all-extras --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src examples scripts

  network-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --all-extras --locked
      - name: Audit with new external connections blocked
        run: |
          sudo iptables -I OUTPUT 1 ! -o lo -m conntrack --ctstate NEW -j REJECT
          if command -v ip6tables >/dev/null; then
            sudo ip6tables -I OUTPUT 1 ! -o lo -m conntrack --ctstate NEW -j REJECT
          fi
          status=0
          uv run python scripts/audit_network_calls.py || status=$?
          sudo iptables -D OUTPUT 1
          if command -v ip6tables >/dev/null; then sudo ip6tables -D OUTPUT 1; fi
          exit "$status"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --locked
      - run: uv lock --check
      - run: uv build
      - run: uv run twine check dist/*
      - run: uv venv .release-venv --python 3.11
      - run: uv pip install --python .release-venv/bin/python dist/*.whl pytest
      - run: TRADELAB_RELEASE_PYTHON=.release-venv/bin/python .release-venv/bin/python -m pytest tests/e2e/test_installed_package.py -q
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

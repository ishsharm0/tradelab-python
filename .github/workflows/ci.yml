name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --all-extras --locked
      - run: uv lock --check
      - run: uv run pytest -q

  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --all-extras --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy --strict src examples scripts

  network-audit:
    name: Network audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --all-extras --locked
      - name: Audit with new external connections blocked
        run: |
          sudo iptables -I OUTPUT 1 ! -o lo -m conntrack --ctstate NEW -j REJECT
          if command -v ip6tables >/dev/null; then
            sudo ip6tables -I OUTPUT 1 ! -o lo -m conntrack --ctstate NEW -j REJECT
          fi
          status=0
          uv run python scripts/audit_network_calls.py || status=$?
          sudo iptables -D OUTPUT 1
          if command -v ip6tables >/dev/null; then sudo ip6tables -D OUTPUT 1; fi
          exit "$status"

  build:
    name: Build installed artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --locked
      - run: uv lock --check
      - run: uv build
      - run: uv run twine check dist/*
      - run: uv venv .release-venv --python 3.11
      - run: uv pip install --python .release-venv/bin/python dist/*.whl pytest pytest-asyncio
      - run: TRADELAB_RELEASE_PYTHON="$PWD/.release-venv/bin/python" .release-venv/bin/python -m pytest tests/e2e/test_installed_package.py -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tradelab-python/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --all-extras --locked
      - name: Verify release tag and package version match
        run: |
          package_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - run: uv lock --check
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src examples scripts
      - run: uv run python scripts/audit_network_calls.py
      - run: uv build
      - run: uv run twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1

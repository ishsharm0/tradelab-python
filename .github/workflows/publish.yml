name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v') && vars.PYPI_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tradelab-python/
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          python-version: "3.11"
          enable-cache: false
      - run: uv sync --all-extras --locked
      - name: Verify release tag and package version match
        run: |
          package_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v$package_version"
      - run: uv lock --check
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy --strict src examples scripts
      - name: Audit with new external connections blocked
        run: |
          sudo iptables -I OUTPUT 1 ! -o lo -m conntrack --ctstate NEW -j REJECT
          if command -v ip6tables >/dev/null; then
            sudo ip6tables -I OUTPUT 1 ! -o lo -m conntrack --ctstate NEW -j REJECT
          fi
          status=0
          uv run python scripts/audit_network_calls.py || status=$?
          sudo iptables -D OUTPUT 1
          if command -v ip6tables >/dev/null; then sudo ip6tables -D OUTPUT 1; fi
          exit "$status"
      - run: uv build
      - run: uv run twine check dist/*
      - run: uv venv .release-venv --python 3.11
      - run: uv pip install --python .release-venv/bin/python dist/*.whl pytest pytest-asyncio
      - run: TRADELAB_RELEASE_PYTHON="$PWD/.release-venv/bin/python" .release-venv/bin/python -m pytest tests/e2e/test_installed_package.py -q
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
